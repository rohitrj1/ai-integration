spring.application.name=AIBackend
server.port=8082

# ?? AI MODEL ??????????????????????????????????????????????????????????????????
spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.chat.options.model=gemini-2.0-flash
spring.ai.google.genai.chat.options.safety-settings.threshold=BLOCK_LOW_AND_ABOVE

# ?? FILE UPLOAD ????????????????????????????????????????????????????????????????
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# ?? SESSION ????????????????????????????????????????????????????????????????????
server.servlet.session.timeout=30m

# ?? EMAILS ? all alerts go to your inbox for testing ??????????????????????????
nutritap.support.email=kumar.rohit@nutritap.in
nutritap.franchise.email=kumar.rohit@nutritap.in
nutritap.from.name=NutriTap Support

# ?? REFUND API ?????????????????????????????????????????????????????????????????
nutritap.refund.api.url=https://api.nutritap.in/v1/refund
nutritap.refund.api.key=${REFUND_API_KEY:CHANGE_ME}

# ?? SMTP ? Gmail with App Password ????????????????????????????????????????????
# Paste your 16-char App Password below (no spaces)
# Get it from: https://myaccount.google.com/apppasswords
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=kumar.rohit@nutritap.in
spring.mail.password=YOUR_APP_PASSWORD_HERE
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ?? TWILIO WHATSAPP (optional) ?????????????????????????????????????????????????
twilio.account.sid=YOUR_TWILIO_SID_HERE
twilio.auth.token=YOUR_TWILIO_TOKEN_HERE
twilio.whatsapp.from=whatsapp:+14155238886

# ?? LOGGING ????????????????????????????????????????????????????????????????????
logging.level.com.demo.ai=INFO
logging.level.org.springframework.ai=WARN
logging.level.org.springframework.mail=DEBUG

